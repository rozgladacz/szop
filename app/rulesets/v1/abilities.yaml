- slug: zle_strzela
  name: Źle strzela
  type: passive
  description: Atakuje na dystans z jakością 5.
- slug: cierpliwy
  name: Cierpliwy
  type: passive
  description: Masz +1 do rzutów obrony, jeżeli nie rozpocząłeś swojej aktywacji w tej rundzie.
- slug: odrodzenie
  name: Odrodzenie
  type: passive
  description: Na koniec swojej aktywacji odzyskujesz połowę, zaokrąglając w górę, utraconych punktów wytrzymałości oddziału.Możesz je wykorzystać, aby przywrócić do gry pokonane model z tego oddziału, jeżeli możesz jej poprawnie rozstawić.
- slug: rezerwa
  name: Rezerwa
  type: passive
  description: Jak zasadzka, ale 12” od Twojej krawędzi stołu (jeżeli nie określają jej zasady rozstawienia wybiera przeciwnik na początku pierwszej rundy)
- slug: wrak
  name: Wrak
  type: passive
  description: Gdy zostaniesz pokonany teren który zajmujesz do końca bitwy uznawany jest niebezpieczny i trudny oraz osłonę.
- slug: roj
  name: Rój
  type: passive
  description: Gdy ten odział jest celem, ignoruj zdolność Zabójczy na broni,ale bronie z Rozprysk(X), działają zawsze z pełną efektywnością.
- slug: zwrot
  name: Zwrot
  type: passive
  description: 'Na końcu ruchu w swojej aktywacji wybiera w która stronę jest zwrócony (nie może tego zmienić poza swoją aktywacją). Jego usytuowanie wyznacza 4 nakładające się strefy, każda o kącie 180’: przód, tył, lewo, prawo.Jeżeli oddział który go atakuje jest cały w tylnej strefie, otrzymuje -1 do obrony.Co najmniej połowa jego broni musi być przypisana do strefy i może atakować tylko cele które w pełni się w niej znajdują. Pozostałe muszą atakować jeden oddział.'
- slug: mistrzostwo
  name: Mistrzostwo
  type: passive
  description: Każda twoja broń ma zdolność X.
  value_label: X
  value_type: text
- slug: mag
  name: Mag
  type: active
  description: 'Otrzymuje X żetonów mocy na początku każdej rundy, do maksymalnie 2X. Magowie w oddziale współdzielą żetony. Wydaj tyle żetonów, ile wynosi koszt czaru i rzuć kością. Przy wyniku 4+ rozstrzygnij jego efekt. Jedna próba na czar na aktywację. '
  value_label: X
  value_type: number
- slug: przekaznik
  name: Przekaźnik
  type: active
  description: Raz na rundę, gdy Mag w zasięgu 12” rzuca czar, może go rzucić z twojej pozycji z +1 do rzutu.
- slug: koordynacja
  name: Koordynacja
